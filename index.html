<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begosi - Ankieta</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .main { background: #1e1e1e; padding: 2.5rem; border-radius: 15px; width: 100%; max-width: 500px; text-align: center; border: 1px solid #333; }
        h1 { color: #ff4444; margin-bottom: 0.5rem; }
        h2 { color: #4caf50; margin-bottom: 2rem; font-size: 1rem; }
        .result-row { margin-bottom: 2rem; background: #252525; padding: 20px; border-radius: 10px; text-align: left; }
        .bar-bg { background: #444; height: 12px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .bar-fill { background: #4caf50; height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .reveal-btn { background: #4caf50; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        .hidden-res { display: none; margin-top: 10px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="main">
    <h1>ANKIETA ZAKOŃCZONA! :D</h1>
    <h2>Dzięki za wszystkie głosy! Oto wyniki:</h2>

    <div class="result-row">
        <label>1. Czy chcesz aby gra była 2D czy 3D?</label>
        <button class="reveal-btn" onclick="reveal('dim')">WYŚWIETL WYNIKI</button>
        <div id="dimRes" class="hidden-res">
            <div id="dimText">...</div>
            <div class="bar-bg"><div id="dimBar" class="bar-fill"></div></div>
        </div>
    </div>

    <div class="result-row">
        <label>2. Na jaką platformę chcesz abym opublikował grę?</label>
        <button class="reveal-btn" onclick="reveal('plat')">WYŚWIETL WYNIKI</button>
        <div id="platRes" class="hidden-res">
            <div id="platText">...</div>
            <div class="bar-bg"><div id="platBar" class="bar-fill"></div></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCLZUoLnZPpNsDOehshUJxTRQbCdpt8MwQ",
      authDomain: "begosi-auth.firebaseapp.com",
      databaseURL: "https://begosi-auth-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "begosi-auth"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let stats = { d2: 0, d3: 0, and: 0, win: 0, total: 0 };

    database.ref('votes').once('value', (snap) => {
        const data = snap.val();
        if (data) {
            stats.total = Object.keys(data).length;
            Object.values(data).forEach(v => {
                if(v.dimension === "2D") stats.d2++; else stats.d3++;
                if(v.platforms && v.platforms.includes("Android")) stats.and++;
                if(v.platforms && v.platforms.includes("Windows")) stats.win++;
            });
        }
    });

    function reveal(type) {
        if (stats.total === 0) return alert("Brak głosów w bazie!");
        
        event.target.style.display = 'none';
        
        if(type === 'dim') {
            document.getElementById('dimRes').style.display = 'block';
            const winner = stats.d2 >= stats.d3 ? "2D" : "3D";
            const winnerCount = stats.d2 >= stats.d3 ? stats.d2 : stats.d3;
            const percent = Math.round((winnerCount / stats.total) * 100);
            
            document.getElementById('dimText').innerText = `WYGRAŁO: ${winner} (${percent}%)`;
            setTimeout(() => { document.getElementById('dimBar').style.width = percent + '%'; }, 100);
        } else {
            document.getElementById('platRes').style.display = 'block';
            const winnerName = stats.and >= stats.win ? "Android (Google Play)" : "Windows / Linux (Steam)";
            const winnerCount = stats.and >= stats.win ? stats.and : stats.win;
            const percent = Math.round((winnerCount / stats.total) * 100);
            
            document.getElementById('platText').innerText = `WYGRAŁO: ${winnerName} (${percent}%)`;
            setTimeout(() => { document.getElementById('platBar').style.width = percent + '%'; }, 100);
        }
    }
</script>
</body>
</html>
